name: Build Event Monitor docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/eventmonitor/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          npm install
          npm run docs:build:all

      - name: Commit site output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: rebuild Event Monitor site (vitepress + pagefind)'
          file_pattern: public/eventmonitor/
